# --- Базовая информация ---
spring.application.name=aesty-messenger

# --- Настройки БД ---
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Настройки Hibernate ---
spring.jpa.hibernate.ddl-auto=update
# Убрана строка hibernate.dialect, Hibernate 6+ сам определяет PostgreSQL, это ускорит старт и уберет предупреждение
spring.jpa.open-in-view=true

# --- Настройки сессий ---
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION

# --- Безопасность (JWT) ---
jwt.secret=${JWT_SECRET:A71E47478999780BE24B9E99EB94DF3FFC734BE72F9C4844067D31F339BF74D4}
jwt.expiration=604800

# --- Почта (остальное берется из MailConfig) ---
app.email.url=https://chapp-254t.onrender.com/confirm-account

# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# --- Прочее ---
spring.thymeleaf.cache=false

# --- Оптимизация запуска (Добавлено) ---
# Ленивая инициализация бинов: ускоряет старт, инициализируя компоненты только при первом обращении
spring.main.lazy-initialization=true
# Явное указание порта для Render, чтобы не тратить время на сканирование
server.port=8080