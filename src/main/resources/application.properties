# --- Базовая информация ---
spring.application.name=aesty-messenger

# --- Настройки БД (Render автоматически подставит свои значения) ---
# Мы используем переменные среды, чтобы не светить пароль в коде
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Настройки Hibernate ---
# Используем 'update' для сохранения данных при перезапусках
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Отключаем предупреждение об open-in-view, если оно мешает
spring.jpa.open-in-view=true

# --- Настройки сессий ---
# Мы уже создали таблицы вручную, поэтому ставим 'never'
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION

# --- Безопасность (JWT) ---
jwt.secret=${JWT_SECRET:A71E47478999780BE24B9E99EB94DF3FFC734BE72F9C4844067D31F339BF74D4}
jwt.expiration=604800

# --- Настройки почты ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:kutbaranov@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:nhha lnls kysc xigp}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.email.url=${APP_EMAIL_URL:http://localhost:8080/confirm-account}

# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# --- Прочее ---
spring.thymeleaf.cache=false