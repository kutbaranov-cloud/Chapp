<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение сброса</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); height: 100vh; display: flex; align-items: center; justify-content: center;">
<div style="background: white; border-radius: 15px; padding: 30px; width: 100%; max-width: 400px;">
    <h4 class="text-center mb-4">Введите код</h4>
    <p class="text-center small">Мы отправили код на <br><b th:text="${email}"></b></p>

    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <form th:action="@{/reset-password-now}" method="post">
        <input type="hidden" name="email" th:value="${email}">
        <div class="mb-3">
            <input type="text" name="code" class="form-control text-center" placeholder="6-значный код" required maxlength="6" style="letter-spacing: 5px; font-weight: bold;">
        </div>
        <div class="mb-3">
            <input type="password" name="newPassword" class="form-control" placeholder="Новый пароль" required minlength="8">
        </div>
        <button type="submit" class="btn btn-success w-100">Сменить пароль</button>
    </form>
</div>
</body>
</html>
