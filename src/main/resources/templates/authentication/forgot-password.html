<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-container { background: white; border-radius: 15px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="login-container">
    <h3 class="text-center mb-4">Сброс пароля</h3>
    <p class="text-muted small text-center">Введите вашу почту, и мы отправим вам код доступа.</p>

    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email адрес" required>
        </div>
        <button type="submit" class="btn btn-primary w-100" style="background: #6a11cb; border: none;">Получить код</button>
        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none small">Вернуться ко входу</a>
        </div>
    </form>
</div>
</body>
</html>
